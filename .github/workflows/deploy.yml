name: Deploy

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── Staging (develop branch) ──────────────────────────────────────────
      - name: Deploy to staging
        if: github.ref == 'refs/heads/develop'
        run: |
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "Deployed to: $DEPLOY_URL"
          vercel alias set "$DEPLOY_URL" motivateyourkids-staging.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
          echo "Staging live at: https://motivateyourkids-staging.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Production (main branch) ──────────────────────────────────────────
      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "Production live at: https://motivateyourkids.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Version archive (tag push) ────────────────────────────────────────
      - name: Create version alias
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SLUG=$(echo "$TAG" | tr '.' '-')
          # Fetch the latest production deployment URL from the Vercel API
          DEPLOY_URL=$(curl -s "https://api.vercel.com/v6/deployments?projectId=${{ secrets.VERCEL_PROJECT_ID }}&target=production&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ const r=JSON.parse(d); console.log('https://'+r.deployments[0].url); })")
          echo "Pinning $DEPLOY_URL → motivateyourkids-${SLUG}.vercel.app"
          vercel alias set "$DEPLOY_URL" "motivateyourkids-${SLUG}.vercel.app" --token=${{ secrets.VERCEL_TOKEN }}
          echo "Version archive live at: https://motivateyourkids-${SLUG}.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
